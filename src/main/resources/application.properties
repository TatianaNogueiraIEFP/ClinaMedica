spring.application.name=ClinaMedica

# ==============================
# CONFIGURAÇĂO DA BASE DE DADOS H2
# ==============================

# URL da base de dados em memória
spring.datasource.url=jdbc:h2:mem:clinamedica;DB_CLOSE_ON_EXIT=FALSE

# Driver da H2
spring.datasource.driverClassName=org.h2.Driver

# Utilizador e password (H2 padrăo)
spring.datasource.username=sa
spring.datasource.password=

# Dialeto JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Criaçăo automática das tabelas (dev)
spring.jpa.hibernate.ddl-auto=update

# Mostrar queries SQL no terminal
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# CONSOLE H2 (interface web)
# ==============================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# CONFIGURAÇĂO THYMELEAF (opcional)
# ==============================

spring.thymeleaf.cache=false